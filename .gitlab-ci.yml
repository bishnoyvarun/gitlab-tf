image:
  name: hashicorp/terraform:1.6.0
  entrypoint: [""]
  
variables:
  TF_STATE_REGION: "eu-north-1"

before_script:
  - terraform --version
  - export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
  - export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
  - export AWS_DEFAULT_REGION=$TF_STATE_REGION
  - terraform init

stages:
  - pre-destroy
  - validate
  - plan
  - apply
  - deploy
  - post-destroy

pre-destroy:
  stage: pre-destroy
  script:
    - terraform destroy -auto-approve
  allow_failure: true

validate:
  stage: validate
  script:
    - terraform validate

plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
  dependencies:
    - validate    

apply:
  stage: apply
  script:
    - terraform apply -input=false "tfplan"
  when: manual
  dependencies:
    - plan

deploy:
  image: amazon/aws-cli:2.13.12
  stage: deploy
  before_script:
    - apk add --no-cache bash curl jq gettext helm
    - aws eks update-kubeconfig --region $TF_STATE_REGION --name my-cluster
  script:
    - cd nginx-chart
    - helm install 1st-release .
  when: manual
  dependencies:
    - apply  

post-destroy:
  stage: post-destroy
  script:
    - terraform destroy -auto-approve
  when: manual
  dependencies:
    - deploy
